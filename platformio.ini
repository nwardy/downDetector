; PlatformIO Project Configuration File
; Down Detector — ESP32 Website Uptime Monitor
;
; Checks a configurable URL at a regular interval. If the site fails
; RETRY_COUNT consecutive attempts, a relay-controlled light is activated.

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate — must match Serial.begin() in main.cpp
monitor_speed = 115200

; No external library dependencies; HTTPClient and WiFi are bundled
; with the Espressif Arduino core.
lib_deps =
